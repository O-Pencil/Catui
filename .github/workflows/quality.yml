name: quality

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  architecture-boundaries:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run verify:quality
      - run: npm run verify:package-boundary   # BR01 package-boundary guard (static)
